<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NPT Analytics Dashboard</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React and ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX transformation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Recharts for Data Visualization -->
    <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/lucide-react@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .recharts-cartesian-grid-horizontal line, .recharts-cartesian-grid-vertical line {
            stroke: #f3f4f6;
        }
    </style>
</head>
<body class="bg-gray-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const { 
            LineChart, Line, BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, Legend, PieChart, Pie, Cell 
        } = Recharts;
        const { 
            Filter, Calendar, Settings, Activity, Clock, AlertTriangle, LayoutDashboard, Menu, X, ChevronRight
        } = LucideReact;

        // --- CONFIGURATION ---
        // Replace this with your deployed Google Apps Script Web App URL
        const API_URL = "https://script.google.com/macros/s/AKfycbzfs4z6RYX26T0q74k4_4H9RkTMF3cvD_4brgz-Jb2m4zuOyHUgP1i7ICBs9PFY0eGK/exec";

        const COLORS = ['#3b82f6', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6', '#ec4899'];

        const App = () => {
            const [data, setData] = useState([]);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);
            const [isSidebarOpen, setSidebarOpen] = useState(false);

            // Filters
            const [filters, setFilters] = useState({
                dateFrom: '',
                dateTo: '',
                sbu: 'All',
                section: 'All',
                type: 'All'
            });

            // Fetch Data
            useEffect(() => {
                const fetchData = async () => {
                    try {
                        const response = await fetch(API_URL);
                        const json = await response.json();
                        
                        const formatted = json.map(item => ({
                            ...item,
                            dateObj: new Date(item.date),
                            npt: parseFloat(item.npt) || 0
                        }));
                        setData(formatted);
                        setLoading(false);
                    } catch (err) {
                        console.error("Fetch error:", err);
                        setError("Please deploy the Apps Script and update the API_URL in the code.");
                        setLoading(false);
                    }
                };

                if (API_URL !== "YOUR_APPS_SCRIPT_WEB_APP_URL_HERE") {
                    fetchData();
                } else {
                    setLoading(false);
                    setError("API URL not configured. Please add your Apps Script URL.");
                }
            }, []);

            // Filter Logic
            const filteredData = useMemo(() => {
                return data.filter(item => {
                    const dateMatch = (!filters.dateFrom || item.dateObj >= new Date(filters.dateFrom)) &&
                                        (!filters.dateTo || item.dateObj <= new Date(filters.dateTo));
                    const sbuMatch = filters.sbu === 'All' || item.sbu === filters.sbu;
                    const sectionMatch = filters.section === 'All' || item.section === filters.section;
                    const typeMatch = filters.type === 'All' || item.type === filters.type;
                    return dateMatch && sbuMatch && sectionMatch && typeMatch;
                });
            }, [data, filters]);

            // Analytics Derived State
            const stats = useMemo(() => {
                const totalNpt = filteredData.reduce((acc, curr) => acc + curr.npt, 0);
                const count = filteredData.length;
                
                const monthlyMap = {};
                filteredData.forEach(d => {
                    const month = d.dateObj.toLocaleString('default', { month: 'short', year: '2-digit' });
                    monthlyMap[month] = (monthlyMap[month] || 0) + d.npt;
                });
                const trendData = Object.entries(monthlyMap).map(([name, value]) => ({ name, value }));

                const typeMap = {};
                filteredData.forEach(d => {
                    typeMap[d.type] = (typeMap[d.type] || 0) + 1;
                });
                const typeData = Object.entries(typeMap)
                    .map(([name, value]) => ({ name, value }))
                    .sort((a, b) => b.value - a.value);

                const lastDates = {};
                filteredData.forEach(d => {
                    if (!lastDates[d.name] || d.dateObj > lastDates[d.name].date) {
                        lastDates[d.name] = { date: d.dateObj, name: d.name, type: d.type };
                    }
                });
                const recentBreakdowns = Object.values(lastDates)
                    .sort((a, b) => b.date - a.date)
                    .slice(0, 5);

                return { totalNpt, count, trendData, typeData, recentBreakdowns };
            }, [filteredData]);

            const uniqueValues = (key) => ['All', ...new Set(data.map(item => item[key]))];

            if (loading) return (
                <div className="flex h-screen items-center justify-center bg-gray-50">
                    <div className="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600"></div>
                </div>
            );

            return (
                <div className="min-h-screen bg-gray-50 flex flex-col md:flex-row font-sans text-gray-900">
                    
                    {/* Sidebar / Filters (Mobile Drawer) */}
                    <div className={`fixed inset-y-0 left-0 z-50 w-64 bg-white shadow-xl transform ${isSidebarOpen ? 'translate-x-0' : '-translate-x-full'} md:translate-x-0 md:static transition-transform duration-300 ease-in-out border-r border-gray-100`}>
                        <div className="p-6">
                            <div className="flex items-center gap-2 mb-8">
                                <div className="bg-blue-600 p-2 rounded-lg">
                                    <Activity className="text-white w-5 h-5" />
                                </div>
                                <h1 className="text-xl font-bold tracking-tight">NPT Analytics</h1>
                            </div>

                            <div className="space-y-6">
                                <div>
                                    <label className="text-xs font-semibold text-gray-400 uppercase tracking-wider block mb-2">SBU</label>
                                    <select 
                                        className="w-full p-2.5 bg-gray-50 border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition-all"
                                        value={filters.sbu}
                                        onChange={(e) => setFilters({...filters, sbu: e.target.value})}
                                    >
                                        {uniqueValues('sbu').map(v => <option key={v} value={v}>{v}</option>)}
                                    </select>
                                </div>

                                <div>
                                    <label className="text-xs font-semibold text-gray-400 uppercase tracking-wider block mb-2">Section</label>
                                    <select 
                                        className="w-full p-2.5 bg-gray-50 border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition-all"
                                        value={filters.section}
                                        onChange={(e) => setFilters({...filters, section: e.target.value})}
                                    >
                                        {uniqueValues('section').map(v => <option key={v} value={v}>{v}</option>)}
                                    </select>
                                </div>

                                <div>
                                    <label className="text-xs font-semibold text-gray-400 uppercase tracking-wider block mb-2">Breakdown Type</label>
                                    <select 
                                        className="w-full p-2.5 bg-gray-50 border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition-all"
                                        value={filters.type}
                                        onChange={(e) => setFilters({...filters, type: e.target.value})}
                                    >
                                        {uniqueValues('type').map(v => <option key={v} value={v}>{v}</option>)}
                                    </select>
                                </div>

                                <div className="pt-4 border-t border-gray-100">
                                    <label className="text-xs font-semibold text-gray-400 uppercase tracking-wider block mb-2">Date Range</label>
                                    <input 
                                        type="date" 
                                        className="w-full mb-2 p-2 bg-gray-50 border border-gray-200 rounded-lg text-sm"
                                        onChange={(e) => setFilters({...filters, dateFrom: e.target.value})}
                                    />
                                    <input 
                                        type="date" 
                                        className="w-full p-2 bg-gray-50 border border-gray-200 rounded-lg text-sm"
                                        onChange={(e) => setFilters({...filters, dateTo: e.target.value})}
                                    />
                                </div>
                            </div>
                        </div>
                    </div>

                    <div className="flex-1 overflow-y-auto">
                        <header className="bg-white border-b border-gray-100 p-4 sticky top-0 z-30 flex items-center justify-between">
                            <button className="md:hidden p-2 hover:bg-gray-100 rounded-lg" onClick={() => setSidebarOpen(!isSidebarOpen)}>
                                {isSidebarOpen ? <X /> : <Menu />}
                            </button>
                            <div className="flex items-center gap-4">
                                <div className="hidden sm:block">
                                    <p className="text-sm text-gray-500">Overview</p>
                                    <h2 className="font-semibold capitalize">{filters.section} Performance</h2>
                                </div>
                            </div>
                            <div className="flex items-center gap-2 text-sm font-medium bg-blue-50 text-blue-700 px-3 py-1.5 rounded-full">
                                <div className="w-2 h-2 bg-blue-600 rounded-full animate-pulse"></div>
                                Live Data
                            </div>
                        </header>

                        <main className="p-4 md:p-8 space-y-8 max-w-7xl mx-auto">
                            {error && (
                                <div className="bg-amber-50 border border-amber-200 text-amber-800 p-4 rounded-xl flex items-start gap-3">
                                    <AlertTriangle className="w-5 h-5 mt-0.5 flex-shrink-0" />
                                    <div>
                                        <p className="font-semibold">Setup Required</p>
                                        <p className="text-sm opacity-90">{error}</p>
                                    </div>
                                </div>
                            )}

                            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
                                <div className="bg-white p-6 rounded-2xl border border-gray-100 shadow-sm hover:shadow-md transition-shadow">
                                    <div className="flex justify-between items-start mb-4">
                                        <div className="p-3 bg-blue-50 rounded-xl text-blue-600">
                                            <Clock className="w-6 h-6" />
                                        </div>
                                    </div>
                                    <p className="text-gray-500 text-sm font-medium">Total NPT Time</p>
                                    <h3 className="text-3xl font-bold mt-1">{stats.totalNpt.toLocaleString()} <span className="text-sm font-normal text-gray-400">min</span></h3>
                                </div>
                                
                                <div className="bg-white p-6 rounded-2xl border border-gray-100 shadow-sm hover:shadow-md transition-shadow">
                                    <div className="flex justify-between items-start mb-4">
                                        <div className="p-3 bg-red-50 rounded-xl text-red-600">
                                            <AlertTriangle className="w-6 h-6" />
                                        </div>
                                    </div>
                                    <p className="text-gray-500 text-sm font-medium">Breakdown Frequency</p>
                                    <h3 className="text-3xl font-bold mt-1">{stats.count} <span className="text-sm font-normal text-gray-400">events</span></h3>
                                </div>

                                <div className="bg-white p-6 rounded-2xl border border-gray-100 shadow-sm hover:shadow-md transition-shadow sm:col-span-2 lg:col-span-1">
                                    <div className="flex justify-between items-start mb-4">
                                        <div className="p-3 bg-emerald-50 rounded-xl text-emerald-600">
                                            <Settings className="w-6 h-6" />
                                        </div>
                                    </div>
                                    <p className="text-gray-500 text-sm font-medium">Avg. Time / Event</p>
                                    <h3 className="text-3xl font-bold mt-1">
                                        {stats.count ? (stats.totalNpt / stats.count).toFixed(1) : 0} 
                                        <span className="text-sm font-normal text-gray-400"> min</span>
                                    </h3>
                                </div>
                            </div>

                            <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                                <div className="bg-white p-6 rounded-2xl border border-gray-100 shadow-sm">
                                    <h3 className="text-lg font-bold mb-6 flex items-center gap-2">
                                        <LayoutDashboard className="w-5 h-5 text-gray-400" />
                                        Monthly NPT Trend
                                    </h3>
                                    <div className="h-64 w-full">
                                        <ResponsiveContainer width="100%" height="100%">
                                            <LineChart data={stats.trendData}>
                                                <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#f0f0f0" />
                                                <XAxis dataKey="name" axisLine={false} tickLine={false} tick={{fontSize: 12}} dy={10} />
                                                <YAxis axisLine={false} tickLine={false} tick={{fontSize: 12}} />
                                                <Tooltip 
                                                    contentStyle={{borderRadius: '12px', border: 'none', boxShadow: '0 10px 15px -3px rgb(0 0 0 / 0.1)'}}
                                                />
                                                <Line type="monotone" dataKey="value" stroke="#3b82f6" strokeWidth={3} dot={{r: 4, fill: '#3b82f6'}} />
                                            </LineChart>
                                        </ResponsiveContainer>
                                    </div>
                                </div>

                                <div className="bg-white p-6 rounded-2xl border border-gray-100 shadow-sm">
                                    <h3 className="text-lg font-bold mb-6 flex items-center gap-2">
                                        <Filter className="w-5 h-5 text-gray-400" />
                                        Top Breakdown Types
                                    </h3>
                                    <div className="h-64 w-full">
                                        <ResponsiveContainer width="100%" height="100%">
                                            <BarChart data={stats.typeData} layout="vertical">
                                                <CartesianGrid strokeDasharray="3 3" horizontal={false} stroke="#f0f0f0" />
                                                <XAxis type="number" hide />
                                                <YAxis dataKey="name" type="category" width={120} axisLine={false} tickLine={false} tick={{fontSize: 11}} />
                                                <Tooltip cursor={{fill: '#f8fafc'}} />
                                                <Bar dataKey="value" radius={[0, 4, 4, 0]}>
                                                    {stats.typeData.map((entry, index) => (
                                                        <Cell key={`cell-${index}`} fill={COLORS[index % COLORS.length]} />
                                                    ))}
                                                </Bar>
                                            </BarChart>
                                        </ResponsiveContainer>
                                    </div>
                                </div>
                            </div>

                            <div className="bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden">
                                <div className="p-6 border-b border-gray-50 flex justify-between items-center">
                                    <h3 className="text-lg font-bold">Latest Occurrences</h3>
                                    <button className="text-blue-600 text-sm font-medium flex items-center hover:underline">
                                        View All <ChevronRight className="w-4 h-4" />
                                    </button>
                                </div>
                                <div className="overflow-x-auto">
                                    <table className="w-full text-left">
                                        <thead className="bg-gray-50 text-xs font-semibold text-gray-400 uppercase tracking-wider">
                                            <tr>
                                                <th className="px-6 py-4">Breakdown Name</th>
                                                <th className="px-6 py-4">Category</th>
                                                <th className="px-6 py-4">Last Date</th>
                                                <th className="px-6 py-4 text-right">Status</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-gray-50">
                                            {stats.recentBreakdowns.map((item, idx) => (
                                                <tr key={idx} className="hover:bg-gray-50 transition-colors group">
                                                    <td className="px-6 py-4 font-medium text-gray-700">{item.name}</td>
                                                    <td className="px-6 py-4">
                                                        <span className="bg-gray-100 text-gray-600 px-2 py-1 rounded text-xs">
                                                            {item.type}
                                                        </span>
                                                    </td>
                                                    <td className="px-6 py-4 text-gray-500 text-sm">{item.date.toLocaleDateString()}</td>
                                                    <td className="px-6 py-4 text-right">
                                                        <span className="inline-flex items-center gap-1.5 text-xs text-amber-600 font-medium">
                                                            <div className="w-1.5 h-1.5 bg-amber-500 rounded-full"></div>
                                                            Logged
                                                        </span>
                                                    </td>
                                                </tr>
                                            ))}
                                            {stats.recentBreakdowns.length === 0 && (
                                                <tr>
                                                    <td colSpan="4" className="px-6 py-12 text-center text-gray-400">No data found for the selected filters.</td>
                                                </tr>
                                            )}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </main>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
